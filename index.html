                if(!q)return[];
                const r=new Set(); const sq=toSimp(q); const tq=toTrad(q);
                stationsAll.forEach(s=>{const tn=simpToTradMap[s]; if(s.includes(q)||s.includes(sq)||tn.includes(q)||tn.includes(tq))r.add(s);});
                return Array.from(r).sort((a,b)=>a.localeCompare(b,'zh'));
            }
            function setupBox(iid,did){
                const inp=document.getElementById(iid), dd=document.getElementById(did);
                inp.addEventListener('input',()=>{
                    const q=inp.value.trim(); dd.innerHTML='';
                    if(!q){dd.classList.remove('show');return;}
                    const matches=searchStations(q);
                    if(!matches.length){dd.classList.remove('show');return;}
                    matches.forEach(s=>{const li=document.createElement('li');li.textContent=simpToTradMap[s];li.dataset.value=s;li.addEventListener('mousedown',e=>{e.preventDefault();inp.value=simpToTradMap[s];inp.dataset.simpValue=s;dd.classList.remove('show');});dd.appendChild(li);});
                    dd.classList.add('show');
                });
                inp.addEventListener('focus',()=>{if(inp.value.trim()&&dd.children.length)dd.classList.add('show');});
                inp.addEventListener('blur',()=>setTimeout(()=>dd.classList.remove('show'),200));
                inp.addEventListener('keydown',e=>{if(e.key==='Enter'){const f=dd.querySelector('li');if(f&&dd.classList.contains('show'))f.click();}});
                return inp;
            }
            const fromInp=setupBox('fromInput','fromDropdown'), toInp=setupBox('toInput','toDropdown');
            document.getElementById('swapBtn').addEventListener('click',()=>{const tv=fromInp.value;fromInp.value=toInp.value;toInp.value=tv;const ts=fromInp.dataset.simpValue;fromInp.dataset.simpValue=toInp.dataset.simpValue;toInp.dataset.simpValue=ts;});

            function buildGraph(){
                const g={};
                stationsAll.forEach(s=>g[s]=[]);
                for(const [k,d] of Object.entries(LINE_DATA)){
                    for(let i=0;i<d.stations.length-1;i++){
                        const a=d.stations[i],b=d.stations[i+1];
                        g[a].push({to:b,lineKey:k,direction:d.dirUp,type:'metro'});
                        g[b].push({to:a,lineKey:k,direction:d.dirDown,type:'metro'});
                    }
                }
                for(const link of BORDER_LINKS){
                    g[link.from].push({to:link.to,lineKey:'__BORDER__',direction:link.label,type:'border',borderLabel:link.label});
                    g[link.to].push({to:link.from,lineKey:'__BORDER__',direction:link.label,type:'border',borderLabel:link.label});
                }
                return g;
            }

            function findDirect(from,to){const fl=stationLines[from],tl=stationLines[to];for(const lk of fl){if(tl.has(lk)){const ld=LINE_DATA[lk],st=ld.stations,fi=st.indexOf(from),ti=st.indexOf(to);if(fi!==-1&&ti!==-1){const dir=fi<ti?ld.dirUp:ld.dirDown,cnt=Math.abs(ti-fi);return{success:true,path:[{lineKey:lk,lineName:ld.name,color:ld.color,startStation:from,endStation:to,direction:dir,count:cnt,type:'metro'}],totalStations:cnt};}}}return null;}
            function findShortest(from,to){if(from===to)return{success:true,path:[],totalStations:0};const g=buildGraph(),visited=new Set();visited.add(from);const q=[{station:from,path:[],totalStations:0}];let bestResult = null;while(q.length){const cur=q.shift();if(bestResult && cur.totalStations >= bestResult.totalStations) continue;const edges = g[cur.station]||[];const metroEdges = edges.filter(e=>e.type!=='border');const borderEdges = edges.filter(e=>e.type==='border');const sortedEdges = [...metroEdges, ...borderEdges];for(const e of sortedEdges){if(visited.has(e.to))continue;visited.add(e.to);const np=cur.path.map(s=>({...s}));if(e.type==='border'){np.push({lineKey:'__BORDER__',lineName:'🛂口岸過關',color:'#FFD700',startStation:cur.station,endStation:e.to,direction:e.borderLabel||'口岸過關',count:0,type:'border'});}else{const last=np.length?np[np.length-1]:null;if(last&&last.lineKey===e.lineKey&&last.type!=='border'){np[np.length-1]={...last,endStation:e.to,count:last.count+1};}else{np.push({lineKey:e.lineKey,lineName:LINE_DATA[e.lineKey].name,color:LINE_DATA[e.lineKey].color,startStation:cur.station,endStation:e.to,direction:e.direction,count:1,type:'metro'});}}if(e.to===to){if(!bestResult || cur.totalStations+1 < bestResult.totalStations){bestResult = {success:true,path:np,totalStations:cur.totalStations+(e.type==='border'?0:1)};}}else{q.push({station:e.to,path:np,totalStations:cur.totalStations+(e.type==='border'?0:1)});}}}if(bestResult) return bestResult;return{success:false,message:'無法到達'};}
            function routesSame(r1,r2){if(!r1||!r2)return false;if(r1.totalStations!==r2.totalStations||r1.path.length!==r2.path.length)return false;return r1.path.every((s,i)=>s.lineKey===r2.path[i].lineKey);}
            function getAllRoutes(from,to){const d=findDirect(from,to),s=findShortest(from,to);const res=[];if(d&&d.success)res.push({type:'direct',route:d});if(s&&s.success&&(!d||!routesSame(d,s)))res.push({type:'shortest',route:s});if(!res.length&&s&&!s.success)return{success:false,message:s.message};return{success:true,routes:res};}

            function drawDiagram(route,canvas){const path=route.path;if(!path.length)return;const nodes=[path[0].startStation];path.forEach(s=>nodes.push(s.endStation));const segColors=path.map(s=>s.type==='border'?'#FFD700':s.color);const ctx=canvas.getContext('2d'),dpr=window.devicePixelRatio||1,W=canvas.clientWidth,H=140;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.scale(dpr,dpr);const pad=40,topY=H/2,count=nodes.length,stepX=count>1?(W-2*pad)/(count-1):0;ctx.lineWidth=5;for(let i=0;i<count-1;i++){const x1=pad+i*stepX,x2=pad+(i+1)*stepX;ctx.beginPath();ctx.moveTo(x1,topY);ctx.lineTo(x2,topY);if(path[i].type==='border'){ctx.setLineDash([6,4]);ctx.strokeStyle='#FFD700';ctx.lineWidth=4;}else{ctx.setLineDash([]);ctx.strokeStyle=segColors[i]||'#999';ctx.lineWidth=5;}ctx.stroke();}ctx.setLineDash([]);ctx.font='bold 11px "PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';nodes.forEach((sn,i)=>{const x=pad+i*stepX,dn=simpToTradMap[sn]||sn,isTr=count>2&&i>0&&i<count-1,isBd=BORDER_STATIONS.has(sn);if(isBd){ctx.beginPath();ctx.arc(x,topY,7,0,2*Math.PI);ctx.fillStyle='#FFD700';ctx.fill();ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.stroke();}else if(isTr){ctx.fillStyle='#333';ctx.fillRect(x-6,topY-6,12,12);ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(x-6,topY-6,12,12);}else{ctx.beginPath();ctx.arc(x,topY,6,0,2*Math.PI);ctx.fillStyle=i===0?'#2e7d32':(i===count-1?'#c62828':'#333');ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();}const offY=i%2===0?-14:24;ctx.fillStyle='#333';ctx.fillText(dn,x,topY+offY);});}

            function showTimeModal(lk,dir){const line=LINE_DATA[lk];if(!line||!line.schedule){alert('該線路暫無首末班車數據');return;}let tk='';if(dir===line.dirUp)tk='toUp';else if(dir===line.dirDown)tk='toDown';else{alert('方向錯誤');return;}const t=line.schedule[tk];if(!t){alert('暫無此方向時間');return;}const ov=document.createElement('div');ov.className='modal-overlay';ov.innerHTML=`<div class="modal-box"><h3>${line.name} · ${dir}方向</h3><div class="time-row"><span class="time-label">首班車：</span>${t.first}</div><div class="time-row"><span class="time-label">末班車：</span>${t.last}</div><div style="font-size:0.8em;color:#666;margin-top:8px;">※ 節假日可能延長運營</div><button class="close-btn" id="closeModal">關閉</button></div>`;document.body.appendChild(ov);ov.addEventListener('click',function(e){if(e.target===ov||e.target.id==='closeModal')document.body.removeChild(ov);});}

            function render(data,fw,tw,fc,tc){const cont=document.getElementById('resultContainer'),err=document.getElementById('errorMsg'),legend=document.getElementById('legendBox');err.classList.remove('show');cont.classList.remove('show');cont.innerHTML='';if(!data.success){err.textContent=data.message||'查詢失敗';err.classList.add('show');legend.style.display='none';return;}const routes=data.routes;if(!routes.length){cont.innerHTML='<div style="background:#f0f7ff;padding:12px;border-radius:8px;">起點與終點相同</div>';cont.classList.add('show');legend.style.display='none';return;}legend.style.display='block';let wh='';if(fw||tw){wh+='<div class="weather-card">';if(fw)wh+=`<span class="weather-item">${getWeatherEmoji(fw.desc)} ${fc}：${fw.desc} ${fw.temp}°C</span>`;if(tw)wh+=`<span class="weather-item">${getWeatherEmoji(tw.desc)} ${tc}：${tw.desc} ${tw.temp}°C</span>`;wh+='</div>';}let html=wh;routes.forEach((item,idx)=>{const r=item.route,isDirect=item.type==='direct',title=isDirect?`🚆 方案${idx+1}：同線直達`:`🔄 方案${idx+1}：最短路線（需轉乘）`,badgeClass=isDirect?'badge-direct':'badge-transfer',badgeText=isDirect?'0次轉乘':`${r.path.length-1}次轉乘`;let totalMin=0;r.path.forEach(s=>{const avg=s.type==='border'?15:(LINE_DATA[s.lineKey]?.type?(TYPE_AVG_TIME[LINE_DATA[s.lineKey].type]||2.5):2.5);totalMin+=Math.round((s.count||0)*avg);});const totalTimeStr=totalMin<60?`約${totalMin}分鐘`:`約${Math.floor(totalMin/60)}小時${totalMin%60}分鐘`;html+=`<div class="option-block"><div class="option-title">${title}<span class="option-badge ${badgeClass}">${badgeText}</span><span style="font-size:0.9em;color:#666;">全程${r.totalStations}站 · ${totalTimeStr}</span></div><canvas class="route-diagram" height="140" style="width:100%;"></canvas>`;r.path.forEach((step,i)=>{if(step.type==='border'){html+=`<div class="step-card" style="background:#fff8e1;border-color:#FFD700;"><div class="step-header"><span class="line-badge" style="background:#FFD700;color:#333;">🛂口岸過關</span><span class="direction-tag">步行過關</span></div><div class="step-route"><strong>${simpToTradMap[step.startStation]||step.startStation}</strong> → <strong>${simpToTradMap[step.endStation]||step.endStation}</strong>（步行約${TYPE_AVG_TIME.border}分鐘）</div></div>`;}else{const transfer=i>0?`<span class="transfer-badge">🔁 在「${simpToTradMap[step.startStation]||step.startStation}」換乘</span>`:'';const timeEst=estimateTime(step);const timeEstHtml=timeEst?`<div class="time-estimate">⏱ 約${timeEst}</div>`:'';const timeBtn=LINE_DATA[step.lineKey]&&LINE_DATA[step.lineKey].schedule?`<button class="time-btn" data-line="${step.lineKey}" data-dir="${step.direction.replace(/"/g,'&quot;')}">🕒 首末班車</button>`:`<button class="time-btn" disabled style="opacity:0.5;">🕒 暫無數據</button>`;html+=`<div class="step-card"><div class="step-header"><span class="line-badge" style="background:${step.color};">${step.lineName}</span><span class="direction-tag">🚆 往「${step.direction}」方向</span>${transfer}</div><div class="step-route"><strong>${simpToTradMap[step.startStation]||step.startStation}</strong> → <strong>${simpToTradMap[step.endStation]||step.endStation}</strong> （${step.count}站）</div>${timeEstHtml}${timeBtn}</div>`;}});html+=`</div>`;});cont.innerHTML=html;cont.classList.add('show');cont.querySelectorAll('.time-btn:not([disabled])').forEach(btn=>{btn.addEventListener('click',function(){showTimeModal(this.dataset.line,this.dataset.dir);});});const canvases=cont.querySelectorAll('canvas.route-diagram');canvases.forEach((c,i)=>{if(routes[i])drawDiagram(routes[i].route,c);});}

            function estimateTime(step){if(step.type==='border')return`${TYPE_AVG_TIME.border}分鐘（步行過關）`;const line=LINE_DATA[step.lineKey];if(!line||!line.type)return null;const avg=TYPE_AVG_TIME[line.type]||2.5;const total=Math.round(step.count*avg);if(total<1)return'少於1分鐘';if(total>=60){const h=Math.floor(total/60),m=total%60;return m>0?`${h}小時${m}分鐘`:`${h}小時`;}return`${total}分鐘`;}

            async function fetchWeather(city){const url=`https://wttr.in/${encodeURIComponent(city)}?format=j1`;try{const r=await fetch(url);if(!r.ok)throw new Error('fail');const d=await r.json();const cur=d.current_condition[0];return{desc:cur.weatherDesc[0].value,temp:cur.temp_C};}catch(e){console.error(e);return null;}}

            async function doSearch(){const fr=fromInp.value.trim(),tr=toInp.value.trim();const err=document.getElementById('errorMsg'),legend=document.getElementById('legendBox');err.classList.remove('show');if(!fr||!tr){err.textContent='請輸入出發站和目的站';err.classList.add('show');document.getElementById('resultContainer').classList.remove('show');legend.style.display='none';return;}const f=fromInp.dataset.simpValue||findStation(fr),t=toInp.dataset.simpValue||findStation(tr);let msgs=[];if(!f)msgs.push(`「${fr}」不是有效的站名`);if(!t)msgs.push(`「${tr}」不是有效的站名`);if(msgs.length){err.innerHTML=msgs.join('<br>');err.classList.add('show');document.getElementById('resultContainer').classList.remove('show');legend.style.display='none';return;}fromInp.value=simpToTradMap[f]||f;fromInp.dataset.simpValue=f;toInp.value=simpToTradMap[t]||t;toInp.dataset.simpValue=t;const data=getAllRoutes(f,t);const fc=getCityFromStation(f),tc=getCityFromStation(t);const[fw,tw]=await Promise.all([fetchWeather(fc),fetchWeather(tc)]);render(data,fw,tw,fc,tc);}

            document.getElementById('searchBtn').addEventListener('click',doSearch);
            document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement!==fromInp&&document.activeElement!==toInp)doSearch();});

            const STATION_COORDS = {'罗湖(深圳)':[22.535,114.113],'落马洲':[22.515,114.068],'金钟':[22.279,114.165],'尖沙咀':[22.297,114.172],'佐敦':[22.305,114.170],'旺角':[22.319,114.169],'太子':[22.324,114.167],'九龙塘':[22.337,114.176],'大围':[22.373,114.178],'沙田':[22.383,114.189],'上水':[22.501,114.128],'福田口岸':[22.518,114.069],'深圳北站':[22.610,114.029],'广州南站':[22.990,113.270],'中山北':[22.516,113.382],'顺德':[22.842,113.245]};
            function calcDistance(lat1,lon1,lat2,lon2){const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180,a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
            function findNearestStation(lat,lon){let min=Infinity,nearest=null;for(const[n,c]of Object.entries(STATION_COORDS)){const d=calcDistance(lat,lon,c[0],c[1]);if(d<min){min=d;nearest=n;}}return{station:nearest,distance:min.toFixed(1)};}
            function locateUser(){const nb=document.getElementById('nearbyResult');nb.classList.remove('show');nb.innerHTML='定位中...';nb.classList.add('show');if(!navigator.geolocation){nb.innerHTML='瀏覽器不支援定位';return;}navigator.geolocation.getCurrentPosition(p=>{const{station,distance}=findNearestStation(p.coords.latitude,p.coords.longitude);if(station)nb.innerHTML=`📍 最近車站：${simpToTradMap[station]||station}（約 ${distance} 公里）`;else nb.innerHTML='附近沒有找到車站';},e=>{nb.innerHTML='無法取得位置，請檢查權限';},{enableHighAccuracy:true,timeout:10000,maximumAge:60000});}
            document.getElementById('nearbyBtn').addEventListener('click',locateUser);
        })();
    </script>
