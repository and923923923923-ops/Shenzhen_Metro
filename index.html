            const stationLines = {};
            const stationsAll = [];
            for (const [k,d] of Object.entries(LINE_DATA)) {
                d.stations.forEach(simpName=>{
                    if(!stationLines[simpName]){stationLines[simpName]=new Set();stationsAll.push(simpName);}
                    stationLines[simpName].add(k);
                });
            }
            stationsAll.sort((a,b)=>a.localeCompare(b,'zh'));
            const simpToTradMap = {}; const tradToSimpMap = {};
            stationsAll.forEach(s=>{const t=toTrad(s);simpToTradMap[s]=t;tradToSimpMap[t]=s;});

            function findStation(input){
                if(!input)return null;
                if(stationLines[input])return input;
                const simp = tradToSimpMap[input];
                if(simp && stationLines[simp])return simp;
                const converted = toSimp(input);
                if(converted !== input && stationLines[converted])return converted;
                const trad = toTrad(input);
                if(trad !== input && tradToSimpMap[trad])return tradToSimpMap[trad];
                const m1=stationsAll.filter(x=>x.includes(input));
                if(m1.length===1)return m1[0];
                const m2=stationsAll.filter(x=>x.includes(converted));
                if(m2.length===1)return m2[0];
                const m3=stationsAll.filter(x=>simpToTradMap[x].includes(input));
                if(m3.length===1)return m3[0];
                return null;
            }

            function searchStations(q){
                if(!q)return[];
                const r=new Set();
                const sq = toSimp(q);
                const tq = toTrad(q);
                stationsAll.forEach(s=>{
                    const tradName = simpToTradMap[s];
                    if(s.includes(q) || s.includes(sq) || tradName.includes(q) || tradName.includes(tq))r.add(s);
                });
                return Array.from(r).sort((a,b)=>a.localeCompare(b,'zh'));
            }

            function setupBox(inputId,dropdownId){
                const inp=document.getElementById(inputId);
                const dd=document.getElementById(dropdownId);
                inp.addEventListener('input',()=>{
                    const q=inp.value.trim();
                    dd.innerHTML='';
                    if(!q){dd.classList.remove('show');return;}
                    const matches=searchStations(q);
                    if(!matches.length){dd.classList.remove('show');return;}
                    matches.forEach(s=>{
                        const li=document.createElement('li');
                        li.textContent=simpToTradMap[s];
                        li.dataset.value=s;
                        li.addEventListener('mousedown',e=>{
                            e.preventDefault();
                            inp.value=simpToTradMap[s];
                            inp.dataset.simpValue=s;
                            dd.classList.remove('show');
                        });
                        dd.appendChild(li);
                    });
                    dd.classList.add('show');
                });
                inp.addEventListener('focus',()=>{if(inp.value.trim()&&dd.children.length)dd.classList.add('show');});
                inp.addEventListener('blur',()=>setTimeout(()=>dd.classList.remove('show'),200));
                inp.addEventListener('keydown',e=>{
                    if(e.key==='Enter'){
                        const first=dd.querySelector('li');
                        if(first&&dd.classList.contains('show'))first.click();
                    }
                });
                return inp;
            }

            const fromInp=setupBox('fromInput','fromDropdown');
            const toInp=setupBox('toInput','toDropdown');

            document.getElementById('swapBtn').addEventListener('click',()=>{
                const tv=fromInp.value;fromInp.value=toInp.value;toInp.value=tv;
                const ts=fromInp.dataset.simpValue;fromInp.dataset.simpValue=toInp.dataset.simpValue;toInp.dataset.simpValue=ts;
            });

            function buildGraph(){
                const g={};
                stationsAll.forEach(s=>g[s]=[]);
                for(const [k,d] of Object.entries(LINE_DATA)){
                    for(let i=0;i<d.stations.length-1;i++){
                        const a=d.stations[i],b=d.stations[i+1];
                        g[a].push({to:b,lineKey:k,direction:d.dirUp});
                        g[b].push({to:a,lineKey:k,direction:d.dirDown});
                    }
                }
                return g;
            }

            function findDirect(from,to){
                const fl=stationLines[from],tl=stationLines[to];
                for(const lk of fl){
                    if(tl.has(lk)){
                        const ld=LINE_DATA[lk];
                        const st=ld.stations;
                        const fi=st.indexOf(from),ti=st.indexOf(to);
                        if(fi!==-1&&ti!==-1){
                            const dir=fi<ti?ld.dirUp:ld.dirDown;
                            const cnt=Math.abs(ti-fi);
                            return {success:true,path:[{lineKey:lk,lineName:ld.name,color:ld.color,startStation:from,endStation:to,direction:dir,count:cnt}],totalStations:cnt};
                        }
                    }
                }
                return null;
            }

            function findShortest(from,to){
                if(from===to)return{success:true,path:[],totalStations:0};
                const g=buildGraph();
                const visited=new Set();visited.add(from);
                const queue=[{station:from,path:[],totalStations:0}];
                while(queue.length){
                    const cur=queue.shift();
                    for(const edge of g[cur.station]||[]){
                        if(visited.has(edge.to))continue;
                        visited.add(edge.to);
                        const newPath=cur.path.map(s=>({...s}));
                        const last=newPath.length?newPath[newPath.length-1]:null;
                        if(last&&last.lineKey===edge.lineKey){
                            newPath[newPath.length-1]={...last,endStation:edge.to,count:last.count+1};
                        }else{
                            newPath.push({lineKey:edge.lineKey,lineName:LINE_DATA[edge.lineKey].name,color:LINE_DATA[edge.lineKey].color,startStation:cur.station,endStation:edge.to,direction:edge.direction,count:1});
                        }
                        if(edge.to===to)return{success:true,path:newPath,totalStations:cur.totalStations+1};
                        queue.push({station:edge.to,path:newPath,totalStations:cur.totalStations+1});
                    }
                }
                return{success:false,message:'無法到達'};
            }

            function routesSame(r1,r2){
                if(!r1||!r2)return false;
                if(r1.totalStations!==r2.totalStations||r1.path.length!==r2.path.length)return false;
                return r1.path.every((s,i)=>s.lineKey===r2.path[i].lineKey);
            }

            function getAllRoutes(from,to){
                const direct=findDirect(from,to);
                const shortest=findShortest(from,to);
                const result=[];
                if(direct&&direct.success)result.push({type:'direct',route:direct});
                if(shortest&&shortest.success&&(!direct||!routesSame(direct,shortest)))result.push({type:'shortest',route:shortest});
                if(!result.length&&shortest&&!shortest.success)return{success:false,message:shortest.message};
                return{success:true,routes:result};
            }

            function drawDiagram(route, canvas) {
                const path = route.path;
                if (!path.length) return;
                const nodes = [path[0].startStation];
                path.forEach(step => nodes.push(step.endStation));
                const segmentColors = path.map(step => step.color);
                const ctx = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                const W = canvas.clientWidth;
                const H = 140;
                canvas.width = W * dpr;
                canvas.height = H * dpr;
                canvas.style.width = W + 'px';
                canvas.style.height = H + 'px';
                ctx.scale(dpr, dpr);
                const padding = 40;
                const topY = H / 2;
                const count = nodes.length;
                const stepX = count > 1 ? (W - 2 * padding) / (count - 1) : 0;
                ctx.lineWidth = 5;
                for (let i = 0; i < count - 1; i++) {
                    const x1 = padding + i * stepX;
                    const x2 = padding + (i + 1) * stepX;
                    ctx.beginPath();
                    ctx.moveTo(x1, topY);
                    ctx.lineTo(x2, topY);
                    ctx.strokeStyle = segmentColors[i] || '#999';
                    ctx.stroke();
                }
                ctx.font = 'bold 11px "PingFang SC", "Microsoft YaHei", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                nodes.forEach((simpName, i) => {
                    const x = padding + i * stepX;
                    const displayName = simpToTradMap[simpName] || simpName;
                    const isTransfer = count > 2 && i > 0 && i < count - 1;
                    if (isTransfer) {
                        ctx.fillStyle = '#333';
                        ctx.fillRect(x - 6, topY - 6, 12, 12);
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(x - 6, topY - 6, 12, 12);
                    } else {
                        ctx.beginPath();
                        ctx.arc(x, topY, 6, 0, 2 * Math.PI);
                        ctx.fillStyle = i === 0 ? '#2e7d32' : (i === count - 1 ? '#c62828' : '#333');
                        ctx.fill();
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                    const offsetY = i % 2 === 0 ? -14 : 24;
                    ctx.fillStyle = '#333';
                    ctx.fillText(displayName, x, topY + offsetY);
                });
            }

            function showTimeModal(lineKey, direction) {
                const line = LINE_DATA[lineKey];
                if (!line || !line.schedule) {
                    alert('該線路暫無首末班車數據（高鐵/城際請查詢12306或車站公告）');
                    return;
                }
                const sched = line.schedule;
                const dirText = direction;
                let timeKey = '';
                if (direction === line.dirUp) timeKey = 'toUp';
                else if (direction === line.dirDown) timeKey = 'toDown';
                else {
                    alert('方向匹配錯誤');
                    return;
                }
                const times = sched[timeKey];
                if (!times) {
                    alert('暫無此方向的時間數據');
                    return;
                }
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                    <div class="modal-box">
                        <h3>${line.name} · ${dirText}方向</h3>
                        <div class="time-row"><span class="time-label">首班車：</span>${times.first}</div>
                        <div class="time-row"><span class="time-label">末班車：</span>${times.last}</div>
                        <div style="font-size:0.8em; color:#666; margin-top:8px;">※ 節假日可能延長運營，請以車站公告為準</div>
                        <button class="close-btn" id="closeModal">關閉</button>
                    </div>
                `;
                document.body.appendChild(overlay);
                overlay.addEventListener('click', function(e) {
                    if (e.target === overlay || e.target.id === 'closeModal') {
                        document.body.removeChild(overlay);
                    }
                });
            }

            function render(data){
                const cont = document.getElementById('resultContainer');
                const err = document.getElementById('errorMsg');
                err.classList.remove('show'); cont.classList.remove('show'); cont.innerHTML = '';
                if (!data.success) {
                    err.textContent = data.message || '查詢失敗';
                    err.classList.add('show');
                    return;
                }
                const routes = data.routes;
                if (!routes.length) {
                    cont.innerHTML = '<div style="background:#f0f7ff;padding:12px;border-radius:8px;">起點與終點相同</div>';
                    cont.classList.add('show');
                    return;
                }
                let html = '';
                routes.forEach((item, idx) => {
                    const r = item.route;
                    const isDirect = item.type === 'direct';
                    const title = isDirect ? `🚆 方案${idx+1}：同線直達` : `🔄 方案${idx+1}：最短路線（需轉乘）`;
                    const badgeClass = isDirect ? 'badge-direct' : 'badge-transfer';
                    const badgeText = isDirect ? '0次轉乘' : `${r.path.length-1}次轉乘`;
                    html += `<div class="option-block">
                        <div class="option-title">${title}
                            <span class="option-badge ${badgeClass}">${badgeText}</span>
                            <span style="font-size:0.9em;color:#666;">全程${r.totalStations}站</span>
                        </div>
                        <canvas class="route-diagram" height="140" style="width:100%;"></canvas>`;
                    r.path.forEach((step, i) => {
                        const transfer = i > 0 ? `<span class="transfer-badge">🔁 在「${simpToTradMap[step.startStation] || step.startStation}」換乘</span>` : '';
                        const lineKey = step.lineKey;
                        const direction = step.direction;
                        const timeBtn = LINE_DATA[lineKey] && LINE_DATA[lineKey].schedule ? 
                            `<button class="time-btn" data-line="${lineKey}" data-dir="${direction.replace(/"/g, '&quot;')}">🕒 首末班車</button>` :
                            `<button class="time-btn" disabled style="opacity:0.5;">🕒 暫無數據</button>`;
                        html += `<div class="step-card">
                            <div class="step-header">
                                <span class="line-badge" style="background:${step.color};">${step.lineName}</span>
                                <span class="direction-tag">🚆 往「${step.direction}」方向</span>
                                ${transfer}
                            </div>
                            <div class="step-route">
                                <strong>${simpToTradMap[step.startStation] || step.startStation}</strong> → 
                                <strong>${simpToTradMap[step.endStation] || step.endStation}</strong> （${step.count}站）
                            </div>
                            ${timeBtn}
                        </div>`;
                    });
                    html += `</div>`;
                });
                cont.innerHTML = html;
                cont.classList.add('show');
                cont.querySelectorAll('.time-btn:not([disabled])').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const line = this.dataset.line;
                        const dir = this.dataset.dir;
                        showTimeModal(line, dir);
                    });
                });
                const canvases = cont.querySelectorAll('canvas.route-diagram');
                canvases.forEach((canvas, i) => {
                    const route = routes[i].route;
                    drawDiagram(route, canvas);
                });
            }

            function doSearch(){
                const fromRaw = fromInp.value.trim();
                const toRaw = toInp.value.trim();
                const err = document.getElementById('errorMsg');
                err.classList.remove('show');
                if (!fromRaw || !toRaw) {
                    err.textContent = '請輸入出發站和目的站';
                    err.classList.add('show');
                    document.getElementById('resultContainer').classList.remove('show');
                    return;
                }
                const f = fromInp.dataset.simpValue || findStation(fromRaw);
                const t = toInp.dataset.simpValue || findStation(toRaw);
                let errorMessages = [];
                if (!f) errorMessages.push(`「${fromRaw}」不是有效的站名，請從下拉清單中選擇`);
                if (!t) errorMessages.push(`「${toRaw}」不是有效的站名，請從下拉清單中選擇`);
                if (errorMessages.length > 0) {
                    err.innerHTML = errorMessages.join('<br>');
                    err.classList.add('show');
                    document.getElementById('resultContainer').classList.remove('show');
                    return;
                }
                fromInp.value = simpToTradMap[f] || f; fromInp.dataset.simpValue = f;
                toInp.value = simpToTradMap[t] || t; toInp.dataset.simpValue = t;
                const data = getAllRoutes(f, t);
                render(data);
            }

            document.getElementById('searchBtn').addEventListener('click', doSearch);
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && document.activeElement !== fromInp && document.activeElement !== toInp) {
                    doSearch();
                }
            });
        })();
    </script>
</body>
</html>
